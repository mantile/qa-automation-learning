[pytest]
markers =
    smoke: Critical path tests (must pass)
    regression: Full test suite
    ui: UI-related tests
    api: API tests
    slow: Tests that take > 5 seconds
    priority_critical: Critical priority tests (P0)
    priority_high: High priority tests (P1)
    priority_medium: Medium priority tests (P2)
    priority_low: Low priority tests (P3)
addopts = -v --tb=short --strict-markers
testpaths = tests