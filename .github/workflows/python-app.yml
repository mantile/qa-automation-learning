name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      setup-complete: ${{ steps.setup.outputs.complete }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Verify setup
        id: setup
        run: |
          python -c "import playwright; print('Playwright installed')"
          python -c "import requests; print('Requests installed')"
          echo "complete=true" >> $GITHUB_OUTPUT

  # ---------- BankingProject ----------
  banking-smoke-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - name: Run BankingProject Smoke tests
        run: |
          pytest -m "banking and smoke" -v --tb=short

  banking-ui-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - name: Run BankingProject UI tests
        run: |
          pytest -m "banking and ui" -v --tb=short

  banking-api-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run BankingProject API tests
        run: |
          pytest -m "banking and api" -v --tb=short

  # ---------- Saucedemo ----------
  saucedemo-smoke-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - name: Run Saucedemo Smoke tests
        run: |
          pytest -m "saucedemo and smoke" -v --tb=short

  saucedemo-ui-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - name: Run Saucedemo UI tests
        run: |
          pytest -m "saucedemo and ui" -v --tb=short

  saucedemo-api-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run Saucedemo API tests
        run: |
          pytest -m "saucedemo and api" -v --tb=short

  # ---------- RestfulBooker ----------
  restfulbooker-smoke-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - name: Run RestfulBooker Smoke tests
        run: |
          pytest -m "restfulbooker and smoke" -v --tb=short

  restfulbooker-ui-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - name: Run RestfulBooker UI tests
        run: |
          pytest -m "restfulbooker and ui" -v --tb=short

  restfulbooker-api-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run RestfulBooker API tests
        run: |
          pytest -m "restfulbooker and api" -v --tb=short

  report:
    needs:
      - banking-smoke-tests
      - banking-ui-tests
      - banking-api-tests
      - saucedemo-smoke-tests
      - saucedemo-ui-tests
      - saucedemo-api-tests
      - restfulbooker-smoke-tests
      - restfulbooker-ui-tests
      - restfulbooker-api-tests
    runs-on: ubuntu-22.04
    if: always()
    
    steps:
      - name: Check all tests passed
        run: |
          echo "All test groups completed!"
          echo ""
          echo "BankingProject: smoke, ui, api"
          echo "Saucedemo: smoke, ui, api"
          echo "RestfulBooker: smoke, ui, api"
          echo ""
          echo "Check the Actions tab for detailed results"