name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Upload setup cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: setup-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

  restfulbooker-api-tests:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: setup-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RestfulBooker API tests
        run: |
          pytest -m "restfulbooker and api" -v --tb=short --alluredir=allure-results-api

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api-${{ matrix.os }}
          path: allure-results-api

  saucedemo-tests:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: setup-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Run Saucedemo tests
        run: |
          pytest -m "saucedemo" -v --tb=short --alluredir=allure-results-ui

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.os }}
          path: allure-results-ui

  allure-report:
    needs:
      - restfulbooker-api-tests
      - saucedemo-tests
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure report
        run: |
          npm install -g allure-commandline
          allure generate allure-results -o allure-report --clean

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report