name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      setup-complete: ${{ steps.setup.outputs.complete }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Verify setup
        id: setup
        run: |
          python -c "import playwright; print('Playwright installed')"
          python -c "import requests; print('Requests installed')"
          echo "complete=true" >> $GITHUB_OUTPUT

  saucedemo-smoke-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      
      - name: Check and run Saucedemo Smoke tests
        id: saucedemo_smoke
        run: |
          MARKER="saucedemo and smoke"
          TEST_COUNT=$(pytest --collect-only -m "$MARKER" -q 2>/dev/null | grep -c "test_" || true)
          echo "Found $TEST_COUNT tests for marker: $MARKER"
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          pytest -m "$MARKER" -v --tb=short

  saucedemo-ui-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      
      - name: Check and run Saucedemo UI tests
        id: saucedemo_ui
        run: |
          MARKER="saucedemo and ui"
          TEST_COUNT=$(pytest --collect-only -m "$MARKER" -q 2>/dev/null | grep -c "test_" || true)
          echo "Found $TEST_COUNT tests for marker: $MARKER"
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          pytest -m "$MARKER" -n 4 -v --tb=short

  restfulbooker-api-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r requirements.txt
      
      - name: Check and run RestfulBooker API tests
        id: restfulbooker_api
        run: |
          MARKER="restfulbooker and api"
          TEST_COUNT=$(pytest --collect-only -m "$MARKER" -q 2>/dev/null | grep -c "test_" || true)
          echo "Found $TEST_COUNT tests for marker: $MARKER"
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          pytest -m "$MARKER" -n 2 -v --tb=short

  report:
    needs:
      - saucedemo-smoke-tests
      - saucedemo-ui-tests
      - restfulbooker-api-tests
    runs-on: ubuntu-22.04
    if: always()
    
    steps:
      - name: Check all tests passed
        run: |
          echo "All test groups completed!"
          echo "Check the Actions tab for detailed results"