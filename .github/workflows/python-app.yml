name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Run RestfulBooker API tests
        run: |
          pytest -m "restfulbooker and api" -v --tb=short --alluredir=allure-results-api

      - name: Run Saucedemo tests
        run: |
          pytest -m "saucedemo" -v --tb=short --alluredir=allure-results-ui -p no:asyncio

      - name: Merge Allure results
        run: |
          mkdir -p allure-results
          cp allure-results-api/* allure-results/ 2>/dev/null || true
          cp allure-results-ui/* allure-results/ 2>/dev/null || true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results -o allure-report --clean

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report